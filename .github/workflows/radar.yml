name: Update Radar Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate SVG Card
        run: |
          node generate-radar-svg.js > radar.svg
        env:
          GITHUB_USERNAME: YOUR_USERNAME

      - name: Commit SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add radar.svg
          git commit -m "Update radar card" || echo "No changes"
          git push
