name: Update Radar Chart

on:
  schedule:
    - cron: "0 0 * * *"  # runs daily
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run script
        run: |
          node generate-radar.js > chart.txt
        env:
          GITHUB_USERNAME: YOUR_USERNAME

      - name: Update README
        run: |
          CHART=$(cat chart.txt)

          sed -i "s|RADAR_CHART_URL|$CHART|g" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Update radar chart" || echo "No changes"
          git push
