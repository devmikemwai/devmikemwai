name: Update Radar Chart

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate Chart Encoding
        run: |
          ENCODED=$(node generate-radar.js | tr -d '\n\r')
          echo "$ENCODED" > chart.txt
        env:
          GITHUB_USERNAME: YOUR_USERNAME

      - name: Build Image URL
        run: |
          ENCODED=$(cat chart.txt)

          echo "https://quickchart.io/chart?format=svg&c=$ENCODED" > chart_url.txt

      - name: Update README
        run: |
          URL=$(cat chart_url.txt)

          awk -v url="$URL" '
          /<!--RADAR_START-->/ {print; print "![Radar](" url ")"; skip=1; next}
          /<!--RADAR_END-->/ {skip=0}
          !skip
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit & Push
        run: |
          git add README.md
          git commit -m "Update radar chart" || echo "No changes"
          git push
