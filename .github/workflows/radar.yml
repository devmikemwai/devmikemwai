name: Update Radar Chart

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate Radar Chart URL
        run: |
          node generate-radar.js > chart.txt
        env:
          GITHUB_USERNAME: YOUR_USERNAME

      - name: Update README
        run: |
          CHART=$(cat chart.txt)

          # REPLACE EXISTING QUICKCHART URL
          sed -i "s|https://quickchart.io/chart?c=.*|$CHART|g" README.md

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add README.md
          git commit -m "Update radar chart" || echo "No changes to commit"
          git push
